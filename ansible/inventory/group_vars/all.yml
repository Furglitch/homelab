---
# Common connection and baseline package defaults for all hosts.
# Secrets (passwords, vault passphrases) must NOT be stored here — use ansible-vault.

ansible_user: root
ansible_python_interpreter: auto_silent

baseline_packages:
  - curl
  - wget
  - ca-certificates
  - gnupg
  - lsb-release
  - apt-transport-https
  - unzip
  - htop
  - net-tools
  - dnsutils

baseline_timezone: "America/Chicago"

puid: 1000
pgid: 1000
umask: "002"
time: "America/Chicago"
theme: "catppuccin-mocha"
themerepo: "ghcr.io/themepark-dev/theme.park"
themecomm: true
ip_public: "furglitch.com"

files:
  docker_path: /docker
  docker_sock: /var/run/docker.sock
  config_path: /docker/config
  data_path: /docker/data
  media_path: /mnt/share/truenas-media
  cloud_path: /mnt/share/truenas-cloud


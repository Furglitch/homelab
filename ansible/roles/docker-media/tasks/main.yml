---
- name: Verify /dev/net/tun exists (configure via Terraform if missing)
  ansible.builtin.stat:
    path: /dev/net/tun
  register: tun_device

- name: Assert TUN device is available
  ansible.builtin.assert:
    that: tun_device.stat.exists
    fail_msg: >
      /dev/net/tun does not exist on docker-media. Run:
      terraform taint null_resource.docker_media_tun && terraform apply -var-file=credentials.tfvars
      Then re-run this playbook.

- name: Create media Docker directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ files.docker_path }}"
    - "{{ files.config_path }}"
    - "{{ files.data_path }}"
    - "{{ files.config_path }}/plex"
    - "{{ files.config_path }}/tautulli"
    - "{{ files.config_path }}/kometa"
    - "{{ files.config_path }}/radarr"
    - "{{ files.config_path }}/sonarr"
    - "{{ files.config_path }}/prowlarr"
    - "{{ files.config_path }}/flaresolverr"
    - "{{ files.config_path }}/recyclarr"
    - "{{ files.config_path }}/qbittorrent"
    - "{{ files.config_path }}/sabnzbd"
    - "{{ files.config_path }}/gluetun"

- name: Render media Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ files.docker_path }}/docker-compose.yml"
    mode: "0644"
    force: true

- name: Remove stale default compose filenames
  ansible.builtin.file:
    path: "{{ files.docker_path }}/{{ item }}"
    state: absent
  loop:
    - compose.yml
    - compose.yaml
    - docker-compose.yaml

- name: Deploy media stack
  community.docker.docker_compose_v2:
    project_src: "{{ files.docker_path }}"
    files:
      - docker-compose.yml
    state: present
    pull: always

- name: Copy Kometa config files
  ansible.builtin.copy:
    src: kometa/
    dest: "{{ files.config_path }}/kometa/"
    mode: "0644"

- name: Render Kometa config template
  ansible.builtin.template:
    src: kometa.yml.j2
    dest: "{{ files.config_path }}/kometa/config.yml"
    mode: "0644"

- name: Render Recyclarr config template
  ansible.builtin.template:
    src: recyclarr.yml
    dest: "{{ files.config_path }}/recyclarr/recyclarr.yml"
    mode: "0644"

---
- name: Create web Docker directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ files.docker_path }}"
    - "{{ files.config_path }}"
    - "{{ files.data_path }}"
    - "{{ files.config_path }}/homarr"
    - "{{ files.config_path }}/vaultwarden"
    - "{{ files.config_path }}/nextcloud"
    - "{{ files.config_path }}/sillytavern"
    - "{{ files.config_path }}/sillytavern/config"
    - "{{ files.config_path }}/sillytavern/data"
    - "{{ files.config_path }}/sillytavern/plugins"
    - "{{ files.config_path }}/sillytavern/extensions"
    - "{{ files.data_path }}/vaultwarden"
    - "{{ files.data_path }}/nextcloud"

- name: Ensure web config paths are writable by containers
  ansible.builtin.file:
    path: "{{ files.config_path }}"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: "0775"
    recurse: true

- name: Ensure web data paths are writable by containers
  ansible.builtin.file:
    path: "{{ files.data_path }}"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: "0775"
    recurse: true

- name: Render web Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ files.docker_path }}/docker-compose.yml"
    mode: "0644"
    force: true

- name: Ensure Homarr appdata ownership
  ansible.builtin.file:
    path: "{{ files.config_path }}/homarr"
    state: directory
    owner: "{{ puid | string }}"
    group: "{{ pgid | string }}"
    recurse: true

- name: Remove stale default compose filenames
  ansible.builtin.file:
    path: "{{ files.docker_path }}/{{ item }}"
    state: absent
  loop:
    - compose.yml
    - compose.yaml
    - docker-compose.yaml

- name: Deploy web stack
  community.docker.docker_compose_v2:
    project_src: "{{ files.docker_path }}"
    files:
      - docker-compose.yml
    state: present
    pull: always

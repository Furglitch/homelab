---
- name: Create nginx-pm Docker directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ files.docker_path }}"
    - "{{ files.config_path }}"
    - "{{ files.data_path }}"
    - "{{ files.data_path }}/nginx-pm"
    - "{{ files.data_path }}/letsencrypt"

- name: Render nginx-pm Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ files.docker_path }}/docker-compose.yml"
    mode: "0644"
    force: true

- name: Remove stale default compose filenames
  ansible.builtin.file:
    path: "{{ files.docker_path }}/{{ item }}"
    state: absent
  loop:
    - compose.yml
    - compose.yaml
    - docker-compose.yaml

- name: Deploy nginx-pm stack
  community.docker.docker_compose_v2:
    project_src: "{{ files.docker_path }}"
    files:
      - docker-compose.yml
    state: present
    pull: always

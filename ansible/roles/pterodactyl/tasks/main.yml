---
- name: Create Pterodactyl Docker directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ files.docker_path }}"
    - "{{ files.config_path }}"
    - "{{ files.data_path }}"
    - "{{ files.data_path }}/pterodactyl/database"
    - "{{ files.data_path }}/pterodactyl/panel/var"
    - "{{ files.data_path }}/pterodactyl/panel/nginx"
    - "{{ files.data_path }}/pterodactyl/panel/certs"
    - "{{ files.data_path }}/pterodactyl/panel/logs"
    - /etc/pterodactyl
    - /var/lib/pterodactyl
    - /var/log/pterodactyl
    - /tmp/pterodactyl

- name: Create MySQL client config to disable SSL for panel container
  ansible.builtin.copy:
    content: |
      [client]
      ssl=false
    dest: "{{ files.data_path }}/pterodactyl/panel/mysql-no-ssl.cnf"
    mode: "0644"

- name: Render Pterodactyl Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ files.docker_path }}/docker-compose.yml"
    mode: "0644"
    force: true

- name: Remove stale default compose filenames
  ansible.builtin.file:
    path: "{{ files.docker_path }}/{{ item }}"
    state: absent
  loop:
    - compose.yml
    - compose.yaml
    - docker-compose.yaml

- name: Render Wings config
  ansible.builtin.template:
    src: wings-config.yml.j2
    dest: /etc/pterodactyl/config.yml
    mode: "0600"
    force: false
  when:
    - pterodactyl.wings_node_uuid != ""
    - pterodactyl.wings_token_id != ""
    - pterodactyl.wings_token != ""

- name: Deploy Pterodactyl stack
  community.docker.docker_compose_v2:
    project_src: "{{ files.docker_path }}"
    files:
      - docker-compose.yml
    state: present
    pull: always
